# AWS App Runner — use with repository "Source directory" = web
# https://docs.aws.amazon.com/apprunner/latest/dg/config-file.html
version: 1.0
runtime: nodejs22        # Node 22 is fine, it's your only option here

build:
  env:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=3072"
    - name: NEXT_TELEMETRY_DISABLED
      value: "1"
  commands:
    build:
      - npm ci --no-audit --no-fund
      - npm run build

run:
  command: npm start
  network:
    port: 3000
